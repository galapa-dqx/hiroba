# Workflow worker for news processing pipeline
name = "hiroba-workflow"
main = "src/index.ts"
compatibility_date = "2025-11-21"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# Log verbosity for the leveled logger in src/logger.ts:
#   debug | info | warn | error | silent
# Deployed default is info. Override per-environment with an [env.<name>.vars]
# block, or locally via `.dev.vars` / the root .env (dev loads it via dotenv).
[vars]
LOG_LEVEL = "info"

[version_metadata]
binding = "CF_VERSION_METADATA"

[[d1_databases]]
binding = "DB"
database_name = "galapa--news-db"
database_id = "16dc90f5-02ec-4c06-99b9-179b64b4f200"
migrations_dir = "migrations"

# R2 bucket mirroring topic images (the pipeline's mirror-images step writes here;
# the web app serves them straight from the bucket's public custom domain).
[[r2_buckets]]
binding = "IMAGES_BUCKET"
bucket_name = "galapa--images"

# Cloudflare Images binding — used by localize-images to re-encode CDN formats
# gpt-image-2 can't ingest (e.g. GIF) into a still PNG before editing.
[images]
binding = "IMAGES"

# Durable Object for coordinating workflow operations and WebSocket connections
[durable_objects]
bindings = [
  { name = "WORKFLOW_MANAGER", class_name = "WorkflowManager" }
]

[[migrations]]
tag = "v1"
# SQLite-backed DO namespace — required on the Workers free plan, and the
# recommended default for new Durable Objects regardless of plan.
new_sqlite_classes = ["WorkflowManager"]

# Cloudflare Workflow for the unified article pipeline (news + topics):
# fetch-body → extract-events → mirror-images → transcribe-images → translate →
# localize-images. The image steps no-op for image-free items (news); the item
# type travels in the workflow params.
[[workflows]]
name = "article-workflow"
binding = "ARTICLE_WORKFLOW"
class_name = "ArticleWorkflow"

# Cloudflare Workflow for eager title translation at discovery (DQX-11): reads
# titles by id and translates them in chunked, retried steps per language.
# Enqueued by the hourly cron.
[[workflows]]
name = "title-workflow"
binding = "TITLE_WORKFLOW"
class_name = "TitleWorkflow"

# Cloudflare Workflow for the whole-archive title backfill of one language
# (DQX-13): pages D1 for untranslated titles and translates them in chunked,
# retried steps. Fired lazily by the first list view in an under-translated
# language (via the WorkflowManager DO, which dedupes per language) or from the
# admin to pre-warm a language.
[[workflows]]
name = "title-backfill-workflow"
binding = "TITLE_BACKFILL_WORKFLOW"
class_name = "TitleBackfillWorkflow"

# Scheduled triggers:
# - Hourly news refresh (first page of each category)
# - Daily glossary refresh (midnight JST = 15:00 UTC)
[triggers]
crons = ["0 * * * *", "0 15 * * *"]

# Local D1 persistence is handled via --persist-to CLI flag in package.json
