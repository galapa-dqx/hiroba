# Workflow worker for news processing pipeline
name = "hiroba-workflow"
main = "src/index.ts"
compatibility_date = "2025-11-21"
compatibility_flags = ["nodejs_compat"]

# No public HTTP entry point. This worker is driven only by its cron triggers
# (the `scheduled` handler) and reached only through the WORKFLOW_MANAGER durable
# object binding from web/admin — never over HTTP. Disabling the workers.dev route
# closes the otherwise-unauthenticated fetch router (/trigger, /reconcile,
# /workflow/*) to the public internet. Bindings and cron are unaffected.
workers_dev = false

[observability]
enabled = true

  # invocation_logs carry status, CPU time, and wall time per request/cron —
  # the signal for chasing 500s and slow steps. Queryable in the dashboard for 7 days.
  [observability.logs]
  invocation_logs = true
  head_sampling_rate = 1

# Log verbosity for the leveled logger in src/logger.ts:
#   debug | info | warn | error | silent
# Deployed default is info. Override per-environment with an [env.<name>.vars]
# block, or locally via `.dev.vars` / the root .env (dev loads it via dotenv).
[vars]
LOG_LEVEL = "info"
# Origins used to build URLs for edge-cache purge (src/purge.ts). Verify these
# match production before relying on busting.
WEB_BASE_URL = "https://news.galapa.app"
IMAGE_BASE = "https://img.news.galapa.app"
CF_ZONE_ID = "d8a17a397c1bc8d302988fd4b1ec7355"
# CF_PURGE_TOKEN is a secret (Zone → Cache Purge) and is NOT stored here — set it
# out of band:  wrangler secret put CF_PURGE_TOKEN
# Until it's set alongside CF_ZONE_ID, purge logs a warning and no-ops.

[version_metadata]
binding = "CF_VERSION_METADATA"

[[d1_databases]]
binding = "DB"
database_name = "galapa--news-db"
database_id = "16dc90f5-02ec-4c06-99b9-179b64b4f200"
migrations_dir = "migrations"

# R2 bucket mirroring topic images (the pipeline's mirror-images step writes here;
# the web app serves them straight from the bucket's public custom domain).
[[r2_buckets]]
binding = "IMAGES_BUCKET"
bucket_name = "galapa--images"

# Cloudflare Images binding — used by localize-images to re-encode CDN formats
# gpt-image-2 can't ingest (e.g. GIF) into a still PNG before editing.
[images]
binding = "IMAGES"

# Durable Objects:
# - WORKFLOW_MANAGER: legacy per-item coordination + SSE (dissolves in DQX-26)
# - FLOW_HUB: the flow framework's control plane — ONE instance ('hub'), ONE
#   SQLite database for all runs/steps/units state (docs/flow-framework.md).
#   Mounted dark in DQX-19; flows register in src/flow-hub.ts as they port.
[durable_objects]
bindings = [
  { name = "WORKFLOW_MANAGER", class_name = "WorkflowManager" },
  { name = "FLOW_HUB", class_name = "FlowHub" }
]

[[migrations]]
tag = "v1"
# SQLite-backed DO namespace — required on the Workers free plan, and the
# recommended default for new Durable Objects regardless of plan.
new_sqlite_classes = ["WorkflowManager"]

[[migrations]]
tag = "v2"
# Additive — deploys alongside the existing v1 namespace untouched.
new_sqlite_classes = ["FlowHub"]

# Cloudflare Workflow for the unified article pipeline (news + topics):
# fetch-body → extract-events → mirror-images → transcribe-images → translate →
# localize-images. The image steps no-op for image-free items (news); the item
# type travels in the workflow params.
[[workflows]]
name = "article-workflow"
binding = "ARTICLE_WORKFLOW"
class_name = "ArticleWorkflow"

# TitleFlow (DQX-11): eager title translation at discovery — reads titles by
# id and translates them in chunked, retried units per language. Started only
# via the FlowHub (hub.start('title'), randomly keyed — every discovery batch
# is disjoint work, so starts never attach) by the hourly cron and the admin
# list-scrape endpoints.
[[workflows]]
name = "title-workflow"
binding = "TITLE_WORKFLOW"
class_name = "TitleWorkflow"

# TitleBackfillFlow (DQX-13): whole-archive title backfill of one language —
# pages D1 for untranslated titles and translates them in chunked, retried
# units. Started only via the FlowHub (hub.start('title-backfill'), keyed per
# language so concurrent triggers attach) by the first list view in an
# under-translated language or from the admin to pre-warm a language.
[[workflows]]
name = "title-backfill-workflow"
binding = "TITLE_BACKFILL_WORKFLOW"
class_name = "TitleBackfillWorkflow"

# NewsBackfillFlow (DQX-23): whole-archive news list scrape. Drains every
# requested category's archive one durable page-unit at a time so it isn't
# bound by a single request's subrequest limit. Started only via the FlowHub
# (hub.start('news-backfill'), keyed by `category ?? 'all'` so concurrent
# triggers attach) from the admin "Backfill All"; the admin follows the hub's
# per-run SSE snapshots.
[[workflows]]
name = "news-backfill-workflow"
binding = "NEWS_BACKFILL_WORKFLOW"
class_name = "NewsBackfillWorkflow"

# Cloudflare Workflow for the home-page rotation banners: scrape the banner
# carousel, then mirror → transcribe → localize each banner image (reusing the
# article image pipeline). Fired hourly by cron and on demand from the admin.
[[workflows]]
name = "banner-workflow"
binding = "BANNER_WORKFLOW"
class_name = "BannerWorkflow"

# GlossaryRegenFlow (DQX-21): regenerate everything affected by a changed
# glossary term. Started only via the FlowHub (hub.start('glossary-regen'),
# keyed per term so concurrent triggers attach) from the admin glossary list;
# keyset-pages the whole affected set one durable step at a time so it isn't
# bound by a single request's subrequest limit, then re-triggers each match's
# ArticleWorkflow.
[[workflows]]
name = "glossary-regenerate-workflow"
binding = "GLOSSARY_REGENERATE_WORKFLOW"
class_name = "GlossaryRegenerateWorkflow"

# Scheduled triggers. The nightly work is staggered into separate invocations
# so each job gets its own subrequest/CPU budget and can't starve the next
# (the playguide crawl alone fetches ~130 pages):
# - Hourly news refresh (first page of each category)
# - Daily glossary + playguide crawl (midnight JST = 15:00 UTC)
# - Daily つよさ予報 schedule refresh + retention prune (00:10 JST)
# - Daily event reconcile sweep (00:20 JST)
[triggers]
crons = ["0 * * * *", "0 15 * * *", "10 15 * * *", "20 15 * * *"]

# Local D1 persistence is handled via --persist-to CLI flag in package.json
